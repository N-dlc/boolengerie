<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BOULANGERIE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>BOULANGERIE</h1>
</header>

<main>

    <!-- MENU -->
    <div id="menu">
        <button onclick="showCategory('pain')">pain</button>
        <button onclick="showCategory('patisserie')">pâtisserie</button>
        <button onclick="showCategory('boisson')">boisson</button>
    </div>

    <!-- PRODUITS -->
    <div id="products" class="products"></div>

    <!-- BOUTON RETOUR -->
    <button id="backBtn" class="hidden" onclick="goBack()">retour</button>

    <!-- RÉSERVATION -->
    <div id="reservation" class="hidden">
        <h2>réserver</h2>

        <input type="date" id="date">

        <select id="time">
            <option>9h - 12h</option>
            <option>12h - 15h</option>
            <option>15h - 18h</option>
        </select>

        <button onclick="sendReservation()">valider</button>
    </div>

    <p id="confirmation" class="hidden">réservation envoyée ✅</p>

</main>

<footer>
    <p>contact : contact.boulangerie@gmail.com</p>
    <p>téléphone : 06 12 34 56 78</p>
</footer>

<script>
const data = {
    pain: [
        {name: "pain au chocolat", img: "images_pain-chocolat.jpg"},
        {name: "baguette", img: "images_baguette.jpg"},
        {name: "pain complet", img: "images_pain-complet.jpg"}
    ],
    patisserie: [
        {name: "tarte aux fraises", img: "images_tarte-fraise.jpg"},
        {name: "millefeuille", img: "images_mille-feuille.jpg"},
        {name: "tarte au chocolat", img: "images_tarte-chocolat.jpg"}
    ],
    boisson: [
        {name: "soda", img: "images_coca.jpg"},
        {name: "café", img: "images_cafe.jpg"},
        {name: "thé", img: "images_the.jpg"}
    ]
};

function showCategory(category) {
    const container = document.getElementById("products");
    container.innerHTML = "";

    document.getElementById("menu").style.display = "none";
    document.getElementById("backBtn").classList.remove("hidden");

    data[category].forEach(item => {
        container.innerHTML += `
            <div class="card">
                <img src="${item.img}" alt="${item.name}">
                <p>${item.name}</p>
                <button onclick="reserve()">réserver</button>
            </div>
        `;
    });

    document.getElementById("reservation").classList.add("hidden");
    document.getElementById("confirmation").classList.add("hidden");
}

function goBack() {
    document.getElementById("menu").style.display = "block";
    document.getElementById("products").innerHTML = "";
    document.getElementById("backBtn").classList.add("hidden");
    document.getElementById("reservation").classList.add("hidden");
    document.getElementById("confirmation").classList.add("hidden");
}

function reserve() {
    document.getElementById("reservation").classList.remove("hidden");
    document.getElementById("confirmation").classList.add("hidden");
}

function sendReservation() {
    document.getElementById("reservation").classList.add("hidden");
    document.getElementById("confirmation").classList.remove("hidden");
}
</script>

</body>
</html>
